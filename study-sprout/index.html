<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Sprout</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========================
       MAIN APP WRAPPER
  ========================== -->
  <main class="app-shell">
    <section class="app-card">

      <!-- =========================
           HEADER / HERO SECTION
      ========================== -->
      <header class="hero">
        <div class="hero-icon">🌱</div>
        <h1 class="app-title">Study Sprout</h1>
        <p class="app-tagline">Grow your day one task at a time.</p>
      </header>

      <!-- =========================
           TASK INPUT SECTION
      ========================== -->
      <section class="task-input-section">
        <h2 class="section-heading">Plant a new task</h2>

        <form class="task-input-wrapper" id="taskForm">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="Enter your task here..."
          />
          <button type="submit" class="add-task-btn" id="addTaskBtn">
            Add to Garden
          </button>
        </form>
      </section>

      <!-- =========================
           FILTER BUTTONS SECTION
      ========================== -->
      <section class="filter-section">
        <div class="filter-top-row">
          <h2 class="section-heading">Filter your garden</h2>
          <button class="clear-completed-btn" id="clearCompletedBtn">
            Clear Completed
          </button>
        </div>

        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </section>

      <!-- =========================
           STATS SECTION
      ========================== -->
      <section class="stats-section">
        <div class="stat-card">
          <p class="stat-label">Total Tasks</p>
          <h3 class="stat-value" id="totalTasks">0</h3>
        </div>

        <div class="stat-card">
          <p class="stat-label">Pending</p>
          <h3 class="stat-value" id="pendingTasks">0</h3>
        </div>

        <div class="stat-card">
          <p class="stat-label">Completed</p>
          <h3 class="stat-value" id="completedTasks">0</h3>
        </div>
      </section>

      <!-- =========================
           PROGRESS SECTION
      ========================== -->
      <section class="progress-section">
        <div class="progress-header">
          <div>
            <h2 class="section-heading">Garden Progress</h2>
            <p class="progress-text" id="progressText">0 of 0 tasks completed</p>
          </div>
          <span class="progress-percentage" id="progressPercentage">0%</span>
        </div>

        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
      </section>

      <!-- =========================
           TASK DISPLAY SECTION
      ========================== -->
      <section class="task-display-section">
        <div class="task-display-header">
          <h2 class="section-heading">My Garden</h2>
          <span class="garden-badge" id="gardenBadge">0 tasks</span>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🪴</div>
          <h3 class="empty-title">Your garden is empty</h3>
          <p class="empty-text">
            Add your first task and start growing your study garden.
          </p>
        </div>

        <div class="task-list" id="taskList"></div>
      </section>

    </section>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
